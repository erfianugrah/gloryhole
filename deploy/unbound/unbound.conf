# Glory-Hole Unbound Configuration
# https://linux.die.net/man/5/unbound.conf
#
# This is the default config shipped in the Docker image. When Glory-Hole's
# managed mode is active (unbound.managed: true), this file is regenerated
# from the Go config model on every save. Manual edits will be overwritten.
#
# For user overrides, place files in /etc/unbound/custom.conf.d/*.conf
# (included at the bottom of this file).

server:
    # === PROCESS ===
    # Run in foreground — Glory-Hole's supervisor manages the lifecycle.
    do-daemonize: no

    # No privilege drop needed — container already runs as glory-hole user,
    # and the supervisor starts Unbound as the same user.
    username: ""

    # No chroot — container is already stripped down.
    chroot: ""

    # Working directory — must match where config/root.hints live.
    directory: "/etc/unbound"

    # Logging to stderr — captured by the Go supervisor and forwarded to slog.
    logfile: ""

    # No pidfile — supervisor tracks the child process directly.
    pidfile: ""

    # Verbosity: 0=errors only, 1=operational, 2=detailed, 3=query-level.
    # Keep at 1; Glory-Hole handles query logging.
    verbosity: 1
    log-queries: no
    log-replies: no
    log-servfail: yes
    log-time-ascii: yes

    # === NETWORK ===
    # Listen on loopback only — Glory-Hole on :53 is the front-facing server.
    interface: 127.0.0.1
    port: 5353

    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # Disable IPv6 unless the host has native v6.
    prefer-ip6: no
    do-ip6: no

    # Only Glory-Hole talks to Unbound — lock down access.
    access-control: 127.0.0.1/32 allow
    access-control: 0.0.0.0/0 refuse

    # === DNSSEC ===
    # Trust glue only if it is within the server's authority.
    harden-glue: yes

    # Require DNSSEC data for trust-anchored zones; if absent, zone becomes BOGUS.
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-algo-downgrade: yes

    # QNAME minimisation (RFC 7816) — reduces information leaked to auth servers.
    qname-minimisation: yes

    # Aggressive NSEC (RFC 8198) — synthesize NXDOMAIN from cached NSEC records.
    aggressive-nsec: yes

    # Clean additional section of unsigned data.
    val-clean-additional: yes

    # Strict validation — bogus answers are SERVFAIL, not passed through.
    val-permissive-mode: no

    # DNSSEC module config — validator + iterator (no ECS by default for privacy).
    # To enable ECS, change to: "subnetcache validator iterator"
    module-config: "validator iterator"

    # Root trust anchor — bootstrapped by unbound-anchor on startup.
    auto-trust-anchor-file: /etc/unbound/root.key

    # === PRIVACY & HARDENING ===
    # Don't use capitalization randomization — known to cause DNSSEC issues.
    # https://discourse.pi-hole.net/t/unbound-stubby-or-dnscrypt-proxy/9378
    use-caps-for-id: no

    # Round-robin rotation of RRsets for load distribution.
    rrset-roundrobin: yes

    # Hide server identity and version from CH TXT queries.
    hide-identity: yes
    hide-version: yes

    # Minimal responses — omit unnecessary authority/additional sections.
    minimal-responses: yes

    # Ensure privacy of local IP ranges.
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # === CACHE ===
    # Sized for a sidecar behind Glory-Hole's own cache layer.
    # Most queries hit Glory-Hole's cache first; Unbound sees the remainder.
    key-cache-size: 16m
    msg-cache-size: 32m
    rrset-cache-size: 64m

    # TTL bounds.
    cache-min-ttl: 0
    cache-max-negative-ttl: 60

    # Prefetch close-to-expired entries (frequently queried domains only).
    prefetch: yes
    prefetch-key: yes

    # Serve expired cache entries while refreshing in background.
    # Prevents DNS failures when upstream is temporarily unreachable.
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-client-timeout: 1800

    # === PERFORMANCE ===
    # 2 threads is sufficient for a sidecar process.
    # Glory-Hole's cache absorbs the hot path; Unbound handles cache misses.
    num-threads: 2

    # Reduce EDNS reassembly buffer size.
    # https://dnsflagday.net/2020/
    edns-buffer-size: 1232

    # Network buffer optimization.
    so-reuseport: yes
    so-sndbuf: 4m
    so-rcvbuf: 4m
    jostle-timeout: 200

    # Connection and query capacity (scaled for 2 threads).
    outgoing-range: 4096
    num-queries-per-thread: 1024

    target-fetch-policy: "3 2 1 0 0"

    # === STATISTICS ===
    extended-statistics: yes
    statistics-interval: 0
    statistics-cumulative: yes

    # === TLS ===
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

    # === ROOT HINTS ===
    # Updated root hints file. Fetch from https://www.internic.net/domain/named.root
    root-hints: /etc/unbound/root.hints

# === REMOTE CONTROL ===
# Unix socket control — no TLS certs needed.
# Used by Glory-Hole supervisor for reload, flush, stats.
remote-control:
    control-enable: yes
    control-interface: /var/run/unbound/control.sock
    control-use-cert: no

# === USER OVERRIDES ===
# Place custom config fragments in /etc/unbound/custom.conf.d/
# Use include: (not include-toplevel:) to avoid parse errors on empty dirs.
# Users must create .conf files in this directory for overrides to take effect.
# include: "/etc/unbound/custom.conf.d/*.conf"

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION_FILE: go.mod

jobs:
  # Run tests first to ensure quality
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pkg/api/ui/dashboard/package-lock.json

      - name: Build Astro dashboard
        run: cd pkg/api/ui/dashboard && npm ci && npm run build

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

  # GoReleaser builds binaries and creates the GitHub release
  release:
    name: Release with GoReleaser
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pkg/api/ui/dashboard/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

  # Docker images built natively per-platform (no QEMU), then merged
  # into a multi-arch manifest. Each arch compiles Unbound natively
  # which is ~5x faster than QEMU cross-compilation.
  docker-build:
    name: Docker (${{ matrix.arch }})
    needs: [release]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download GoReleaser binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="glory-hole-${TAG#v}-linux-${{ matrix.arch }}.tar.gz"
          mkdir -p "dist/glory-hole_linux_${{ matrix.arch }}"
          gh release download "$TAG" --pattern "$ARCHIVE" --dir /tmp
          tar xzf "/tmp/$ARCHIVE" -C "dist/glory-hole_linux_${{ matrix.arch }}"

      - name: Extract metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/glory-hole:${{ steps.meta.outputs.version }}-${{ matrix.arch }}
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.title=glory-hole
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,scope=docker-${{ matrix.arch }},mode=max

  # Merge per-arch images into multi-arch manifests
  docker-manifest:
    name: Docker Manifest
    needs: [docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push Docker Hub manifests
        run: |
          TAG="${{ steps.meta.outputs.version }}"
          DH="${{ secrets.DOCKER_USERNAME }}/glory-hole"

          docker buildx imagetools create -t "${DH}:${TAG}" \
            "${DH}:${TAG}-amd64" "${DH}:${TAG}-arm64"

          docker buildx imagetools create -t "${DH}:latest" \
            "${DH}:${TAG}-amd64" "${DH}:${TAG}-arm64"

      - name: Create and push GHCR manifests
        run: |
          TAG="${{ steps.meta.outputs.version }}"
          GHCR="ghcr.io/${{ github.repository }}"

          docker buildx imagetools create -t "${GHCR}:${TAG}" \
            "${GHCR}:${TAG}-amd64" "${GHCR}:${TAG}-arm64"

          docker buildx imagetools create -t "${GHCR}:latest" \
            "${GHCR}:${TAG}-amd64" "${GHCR}:${TAG}-arm64"

  # Deploy to Fly.io after all images are published
  fly-deploy:
    name: Deploy to Fly.io
    needs: [docker-manifest]
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Write config.fly.yml from secret
        run: echo "${{ secrets.FLY_CONFIG_YML }}" | base64 -d > config.fly.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push Fly image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fly
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/glory-hole:fly
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha,scope=docker-fly
          cache-to: type=gha,scope=docker-fly,mode=max

      - name: Deploy to Fly.io
        run: flyctl deploy --image ${{ secrets.DOCKER_USERNAME }}/glory-hole:fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

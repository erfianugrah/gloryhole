version: 2

project_name: glory-hole

before:
  hooks:
    - go mod tidy
    - bash -c 'cd pkg/api/ui/dashboard && npm ci && npm run build'

builds:
  - id: glory-hole
    main: ./cmd/glory-hole
    binary: glory-hole
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.ShortCommit}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - config/config.example.yml

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "gloryhole"
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Gloryhole {{ .Tag }}

    High-Performance DNS Server & Ad Blocker

    ### Installation

    #### Docker
    ```bash
    docker pull {{ .Env.DOCKER_USERNAME }}/glory-hole:{{ .Tag }}
    ```

    #### Binary
    Download the appropriate binary for your platform from the assets below.

  footer: |
    ### Verification
    Verify checksums:
    ```bash
    sha256sum -c checksums.txt
    ```

    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY }}/compare/{{ .PreviousTag }}...{{ .Tag }}

# Docker images are built separately via docker buildx in the release
# workflow using Dockerfile.release with the pre-built GoReleaser binaries.
# This avoids redundant Go/Astro compilation inside Docker and is much faster.
